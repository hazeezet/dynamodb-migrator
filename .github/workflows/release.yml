name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Rust Checks
        working-directory: rust_cli
        run: |
          cargo fmt --all --check
          cargo clippy -- -D warnings
          cargo test
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Python Checks
        working-directory: python_app
        run: |
          pip install -r requirements.txt
          flake8 . --count --select=E9,F63,F7,F82,F401 --show-source --statistics
          python -m pytest tests/

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: zip
            binary_name: ddbm
            alias_name: dynamodb-migrator
            friendly_name: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: zip
            binary_name: ddbm
            alias_name: dynamodb-migrator
            friendly_name: linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: zip
            binary_name: ddbm
            alias_name: dynamodb-migrator
            friendly_name: macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: zip
            binary_name: ddbm
            alias_name: dynamodb-migrator
            friendly_name: macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary_name: ddbm.exe
            alias_name: dynamodb-migrator.exe
            friendly_name: windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: rust_cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp rust_cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp rust_cli/target/${{ matrix.target }}/release/${{ matrix.alias_name }} dist/
          cp scripts/install.sh dist/install
          cp scripts/uninstall.sh dist/uninstall
          chmod +x dist/install dist/uninstall
          zip -j ddbm-${{ matrix.friendly_name }}.zip dist/*

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Create ZIP archive as before
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "rust_cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          Copy-Item "rust_cli/target/${{ matrix.target }}/release/${{ matrix.alias_name }}" dist/
          Compress-Archive -Path dist/* -DestinationPath "ddbm-${{ matrix.friendly_name }}.zip"

          # Generate MSI using WiX (native to Windows runners)
          cd rust_cli
          $version = (Get-Content Cargo.toml | Select-String "^version =" | ForEach-Object { $_.ToString().Split('"')[1] })
          Write-Host "Detected Version: $version"
          candle -arch x64 "-dVersion=$version" -out main.wixobj wix/main.wxs
          light -out "../ddbm-${{ matrix.friendly_name }}.msi" main.wixobj

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddbm-${{ matrix.friendly_name }}
          path: |
            ddbm-${{ matrix.friendly_name }}.zip
            ddbm-${{ matrix.friendly_name }}.msi

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Hash Table
        id: hash_table
        run: |
          echo "### Hashes:" >> hash_summary.md
          echo "| Filename | SHA256 |" >> hash_summary.md
          echo "| :--- | :--- |" >> hash_summary.md
          
          # Calculate hashes for all files in the artifacts directory
          find artifacts -type f -regex ".*\.\(zip\|msi\)" | sort | while read -r file; do
            hash=$(sha256sum "$file" | cut -d ' ' -f 1)
            filename=$(basename "$file")
            echo "| **$filename** | \`$hash\` |" >> hash_summary.md
          done
          
          # Store in env to pass to release action
          echo "HASH_TABLE<<EOF" >> $GITHUB_ENV
          cat hash_summary.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ${{ env.HASH_TABLE }}
          files: artifacts/**/*
