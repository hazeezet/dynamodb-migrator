name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary_name: ddbm
            alias_name: dynamodb-migrator

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary_name: ddbm
            alias_name: dynamodb-migrator

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary_name: ddbm
            alias_name: dynamodb-migrator

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary_name: ddbm.exe
            alias_name: dynamodb-migrator.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: rust_cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp rust_cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp rust_cli/target/${{ matrix.target }}/release/${{ matrix.alias_name }} dist/
          cd dist
          tar czf ../ddbm-${{ matrix.target }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "rust_cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          Copy-Item "rust_cli/target/${{ matrix.target }}/release/${{ matrix.alias_name }}" dist/
          Compress-Archive -Path dist/* -DestinationPath "ddbm-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddbm-${{ matrix.target }}
          path: ddbm-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
